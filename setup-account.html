<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Your TavaOne Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-wrapper">

    <div class="login-card" style="max-width: 400px; margin: 4rem auto;">
        <h2>Welcome to TavaOne!</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Set your password to finalize your account and access your studio.</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="signup-email" disabled>
        </div>
        <div class="input-group" style="margin-bottom: 2rem;">
            <label>Create Password</label>
            <input type="password" id="signup-password" placeholder="••••••••••••">
        </div>
        
        <button class="btn btn-primary" onclick="finalizeAccount()">Complete Registration</button>
        <p id="signup-error" class="text-red" style="margin-top: 1rem;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
    "https://fntsthjupopvbwvmfsmz.supabase.co", 
    "sb_publishable_MLMqkdV5LqZsqvq9JhN4kw_XrJvzjAS"
);

        // Grab email from URL if you passed it, or just let them type it
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('signup-email').value = params.get('email') || "";
        };

    async function finalizeAccount() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    // 1. Verify they paid first
    const { data: pending } = await supabase
        .from('pending_registrations')
        .select('*')
        .eq('email', email)
        .eq('status', 'paid')
        .maybeSingle();

    if (!pending) {
        return alert("No payment record found for this email. Did you complete the subscription?");
    }

    // 2. Sign up
    const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
    if (authError) return document.getElementById('signup-error').innerText = authError.message;

    // 3. Upgrade to Founders
    await supabase.from('user_profiles').upsert({ 
        id: authData.user.id, 
        subscription_tier: 'founders' 
    });

    alert("Registration complete! Welcome to Founders.");
    window.location.href = "index.html";
}
}
    </script>
</body>
</html>
