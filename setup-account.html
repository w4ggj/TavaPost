<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Your TavaOne Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-wrapper">

    <div class="login-card" style="max-width: 400px; margin: 4rem auto;">
        <h2>Welcome to TavaOne!</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Set your password to finalize your account and access your studio.</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="signup-email" disabled>
        </div>
        <div class="input-group" style="margin-bottom: 2rem;">
            <label>Create Password</label>
            <input type="password" id="signup-password" placeholder="••••••••••••">
        </div>
        
        <button class="btn btn-primary" onclick="finalizeAccount()">Complete Registration</button>
        <p id="signup-error" class="text-red" style="margin-top: 1rem;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
    "https://fntsthjupopvbwvmfsmz.supabase.co", 
    "sb_publishable_MLMqkdV5LqZsqvq9JhN4kw_XrJvzjAS"
);

        // Grab email from URL if you passed it, or just let them type it
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('signup-email').value = params.get('email') || "";
        };

        async function finalizeAccount() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    if (!password) return alert("Please create a password.");

    // 1. Sign up the user
    const { data: authData, error: authError } = await supabase.auth.signUp({ 
        email, 
        password 
    });

    if (authError) {
        document.getElementById('signup-error').innerText = authError.message;
        return;
    }

    // 2. Map the new user to their paid tier
    // Note: We use the ID returned from the sign-up process
    const { error: updateError } = await supabase
        .from('user_profiles')
        .upsert({ 
            id: authData.user.id, 
            subscription_tier: 'founders',
            monthly_draft_count: 0 // Initialize for new users
        });

    if (updateError) {
        console.error("Tier update failed:", updateError);
        alert("Account created, but there was an issue setting your plan. Contact support.");
    } else {
        alert("Account finalized! Welcome to the Founders tier.");
        window.location.href = "index.html";
    }
}
    </script>
</body>
</html>
