
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavaPost Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button, textarea { width: 100%; margin-top: 10px; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .hidden { display: none; }
        #loading { color: #d9534f; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">TavaPost</h1>

    <div id="auth-section" class="card">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Log In</button>
        <p id="auth-error" style="color: red;" class="hidden"></p>
    </div>

    <div id="app-section" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Create New Post</h2>
            <button onclick="logout()" style="width: auto; background-color: #6c757d;">Logout</button>
        </div>
        <div class="settings-box" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9;">
            <h3 style="margin-top: 0;">My Custom Instructions</h3>
            <textarea id="customPrompt" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" rows="10" placeholder="e.g., Act as the social media manager for @grumpagrinch. Write a sarcastic, grumpy TikTok caption for this photo..."></textarea>
            <br>
            <button onclick="saveSettings()" style="margin-top: 10px; padding: 8px 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Save Instructions</button>
            <span id="save-status" class="hidden" style="color: green; margin-left: 10px;">Saved!</span>
        </div>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="generateDraft()">1. Generate Draft</button>
        
        <p id="loading" class="hidden">Sending image to Visualizer... please wait.</p>

    <div id="selection-area" class="hidden" style="margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px;">
         <h3 style="margin-top: 0;">1. Select Your Favorite Draft:</h3>
         <div id="draft-cards" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"></div>

         <h3>2. Final Polish (Edit if needed):</h3>
         <textarea id="finalCaption" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" rows="10"></textarea>
         <br>
         <button onclick="publishToSocials()" style="margin-top: 15px; padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">🚀 Send to Social Media</button>
     </div>
    </div>

    <script>
        // --- INITIALIZE SUPABASE ---
        // PASTE YOUR KEYS HERE
        const SUPABASE_URL = 'https://fntsthjupopvbwvmfsmz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_MLMqkdV5LqZsqvq9JhN4kw_XrJvzjAS';
        
        // THE FIX: Changed variable name to supabaseClient
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // --- UI TOGGLING ---
        function checkSession() {
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    loadSettings(); // <-- ADD THIS LINE HERE
                } else {
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('app-section').classList.add('hidden');
                }
            });
        }
        
        checkSession(); // Run on page load

        // --- AUTHENTICATION ---
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                document.getElementById('auth-error').innerText = error.message;
                document.getElementById('auth-error').classList.remove('hidden');
            } else {
                checkSession();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            checkSession();
        }

        // --- APP LOGIC ---
        // --- SETTINGS LOGIC ---
        async function loadSettings() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;

            // Go to Supabase and look for this user's saved prompt
            const { data, error } = await supabaseClient
                .from('user_settings')
                .select('custom_prompt')
                .eq('user_id', session.user.id)
                .single();

            if (data && data.custom_prompt) {
                document.getElementById('customPrompt').value = data.custom_prompt;
            }
        }

        async function saveSettings() {
            const promptText = document.getElementById('customPrompt').value;
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (!session) return;

            // Save the new prompt to the database linked to this specific user ID
            const { error } = await supabaseClient
                .from('user_settings')
                .upsert({ 
                    user_id: session.user.id, 
                    custom_prompt: promptText 
                });

            if (error) {
                alert("Error saving: " + error.message);
            } else {
                // Show a quick "Saved!" message
                const status = document.getElementById('save-status');
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        }
        async function generateDraft() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) {
                alert("Please select an image first.");
                return;
            }

            // Show loading text
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('selection-area').classList.add('hidden');

            // Get the secure token for the logged-in user
            const { data: { session } } = await supabaseClient.auth.getSession();
            const token = session.access_token;

            // Prepare the image to send to Python
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // PASTE YOUR RENDER URL HERE
                const response = await fetch('https://tavapost-backend.onrender.com/generate-draft', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const result = await response.json();
                
               if (response.ok) {
                 // Save the image URL globally and unhide the selection area
                 window.currentImageUrl = result.image_url;
                 document.getElementById('selection-area').classList.remove('hidden');

                 // Chop the AI text into 3 options (splitting by "1.", "2.", "3.")
                 const options = result.draft_text.split(/(?:^|\n)\**\d+\.\**\s/).filter(opt => opt.trim().length > 5);
                 const cardsContainer = document.getElementById('draft-cards');
                 cardsContainer.innerHTML = ""; // Clear old cards

                 if (options.length > 0) {
                     options.forEach((opt) => {
                         const card = document.createElement('div');
                         card.style.cssText = "border: 2px solid #ccc; padding: 15px; border-radius: 8px; cursor: pointer; flex: 1; min-width: 250px; background: #fff;";
                         card.innerText = opt.trim();
                         card.onclick = () => {
                             // Highlight selected card in green
                             Array.from(cardsContainer.children).forEach(c => c.style.borderColor = '#ccc');
                             card.style.borderColor = '#28a745';
                             document.getElementById('finalCaption').value = opt.trim();
                         };
                         cardsContainer.appendChild(card);
                     });
                 } else {
                     // Fallback just in case Gemini formats it weirdly
                     document.getElementById('finalCaption').value = result.draft_text;
                 }
             } else {
                 alert("Error from server: " + result.detail);
             }
            } catch (err) {
                alert("Failed to connect to the backend. Is it running?");
            } finally {
                // Hide loading text
                document.getElementById('loading').classList.add('hidden');
            }
        }

async function publishToSocials() {
    const finalCaption = document.getElementById('finalCaption').value;
    const imageUrl = window.currentImageUrl;
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!finalCaption || !imageUrl || !session) {
        alert("Missing caption, image, or login session!");
        return;
    }

    try {
        const response = await fetch('https://tavapost-backend.onrender.com/publish-post', {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${session.access_token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                image_url: imageUrl,
                caption: finalCaption
            })
        });
        
        const result = await response.json();
        if (response.ok) {
            alert("Success! Your post has been sent to your Zapier webhook.");
            document.getElementById('selection-area').classList.add('hidden');
            document.getElementById('finalCaption').value = "";
        } else {
            alert("Error posting: " + result.detail);
        }
    } catch (err) {
        alert("Server connection failed. Check your internet.");
    }
}
    </script>
</body>
</html>
