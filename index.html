<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavaOne // Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div id="system-crash-alert" class="view-section container">
        <div class="panel" style="border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.05); padding: 1rem;">
            <h2 style="color: #ef4444;">⚠️ System Handshake Failure</h2>
            <p id="crash-diagnostic-text">Your client failed to connect with your database.</p>
        </div>
    </div>

    <div id="view-login" class="view-section landing-wrapper">
        <div class="landing-grid">
            <div class="left-column">
                <h1>Command Your Brand's <span>Social Presence</span></h1>
                <p>Upload your media and let our system craft high-converting content.</p>
            </div>
            <div class="right-column">
                <div class="login-card">
                    <h2>Access Studio</h2>
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-password" placeholder="Password">
                    <button class="btn btn-primary" onclick="signInUser()">Log In</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-dashboard" class="view-section container">
        <main class="panel">
            <h2>Content Pipeline</h2>
            <button id="btn-generate" class="btn btn-primary" onclick="generateDraft()">Analyze & Generate</button>
            <div id="selection-area" class="view-section">
                <button id="btn-publish" class="btn btn-primary" onclick="publishToSocials()">🚀 Publish</button>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="studio.js"></script>
</body>
</html>
