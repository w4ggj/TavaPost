<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavaPost // Social Media Content Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
<body>
    <script>
        // ... [Keep all your JS up to publishToSocials] ...

        async function publishToSocials() {
            const caption = document.getElementById('finalCaption').value;
            const btnPub = document.getElementById('btn-publish');
            const targetFB = document.getElementById('publish-to-fb').checked;
            const targetIG = document.getElementById('publish-to-ig').checked;

            if (!caption.trim()) { alert("Please select a caption variant first."); return; }
            if (!targetFB && !targetIG) { alert("Please select at least one social channel."); return; }

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;

            const { data: settings } = await supabaseClient
                .from('user_settings')
                .select('zernio_facebook_id, zernio_instagram_id')
                .eq('user_id', session.user.id)
                .maybeSingle();

            const fbId = (targetFB && settings) ? settings.zernio_facebook_id : null;
            const igId = (targetIG && settings) ? settings.zernio_instagram_id : null;

            btnPub.classList.add('btn-disabled');
            btnPub.innerText = "Publishing Content...";

            try {
                // 🚀 FIXED: The syntax here must use a colon ':' for the headers object
                const response = await fetch(`${backendBaseUrl}/publish-post?t=${Date.now()}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({
                        image_url: window.currentPostImageUrl || "",
                        caption: caption,
                        fb_account_id: fbId || "",
                        ig_account_id: igId || "",
                        profile_id: session.user.id
                    })
                });

                const data = await response.json();
                if (data.status === "success") {
                    alert("🚀 Post successfully published!");
                } else {
                    alert(`Delivery Mismatch: ${data.detail || 'Review connections.'}`);
                }
            } catch (err) {
                console.error(err);
                alert("Error communicating with server.");
            } finally {
                btnPub.classList.remove('btn-disabled');
                btnPub.innerText = "🚀 Publish Directly to Social Channels";
            }
        }
    </script>
</body>
</html>
