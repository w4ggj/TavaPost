            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard // TavaOne Studio</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin specific table styles */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        .admin-table th { background: rgba(15, 23, 42, 0.8); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .admin-table tr:hover { background: rgba(255, 255, 255, 0.02); }
        .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); }
        .badge.active { background: rgba(34, 197, 94, 0.1); color: var(--accent-green); }
        .btn-small { padding: 0.4rem 0.75rem; font-size: 0.8rem; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-small:hover { border-color: var(--accent-purple); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container" style="margin-top: 3rem; margin-bottom: 4rem; max-width: 1200px !important;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">System Administration</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Manage user accounts, connections, and data privacy requests.</p>
            </div>
            <button class="btn btn-primary" onclick="loadUsers()">Refresh Data</button>
        </div>

        <details style="margin-bottom: 2rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem;">
    <summary style="cursor: pointer; font-weight: 600; color: var(--accent-purple);">➕ Provision New User Account</summary>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 1rem; margin-top: 1rem; align-items: end;">
        <div class="input-group">
            <label style="font-size: 0.8rem; color: var(--text-muted);">Email</label>
            <input type="email" id="new-user-email" placeholder="user@brand.com" style="width: 100%; padding: 0.5rem; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 4px; color: white;">
        </div>
        <div class="input-group">
            <label style="font-size: 0.8rem; color: var(--text-muted);">Password</label>
            <input type="password" id="new-user-pass" placeholder="••••••••" style="width: 100%; padding: 0.5rem; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 4px; color: white;">
        </div>
        <div class="input-group">
            <label style="font-size: 0.8rem; color: var(--text-muted);">Initial Tier</label>
            <select id="new-user-tier" style="width: 100%; padding: 0.5rem; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 4px; color: white;">
                <option value="starter">Starter</option>
                <option value="founders">Founders</option>
                <option value="complimentary">Complimentary</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="provisionUser()">Create Account</button>
    </div>
</details>

<table class="admin-table">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>User ID / Email</th>
                    <th>Tier</th>
                    <th>Meta Connection</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-user-list">
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-muted);">Loading users...</td>
                </tr>
            </tbody>
        </table>

    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="studio.js"></script>
    
    <script>
        // We will build out this logic to talk to your Python backend next
        const BACKEND_URL = "https://tavapost-backend.onrender.com"; // Your Render URL
        const ADMIN_SECRET = "tava-admin-998877"; // Must match what is in main.py

        async function loadUsers() {
            const tableBody = document.getElementById('admin-user-list');
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Loading users from database...</td></tr>';
            
            try {
                const response = await fetch(`${BACKEND_URL}/admin/users`, {
                    method: 'GET',
                    headers: {
                        'x-admin-secret': ADMIN_SECRET
                    }
                });
                
                const result = await response.json();
                
                if (!response.ok) throw new Error(result.detail || "Failed to load users");
                
                if (result.data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No users found.</td></tr>';
                    return;
                }
                
                // Build the table rows dynamically based on the database response
                tableBody.innerHTML = result.data.map(user => {
                    // Decide what colors to make the badges based on their tier
                    const tierBadgeClass = user.tier.toLowerCase() === 'pro' ? 'badge active' : 'badge';
                    
                    // ... inside loadUsers() .map() function:
                    return `
                    <tr>
                        <td>
                            <div style="font-weight: 600;">${user.email}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">ID: ${user.id.substring(0, 8)}...</div>
                        </td>
                        <td>
                            <span class="${tierBadgeClass}" style="text-transform: capitalize;">${user.tier}</span>
                        </td>
                        <td>
                            <button class="btn-small" onclick="toggleAdmin('${user.id}', '${user.tier}')">
                                ${user.tier === 'admin' ? 'Revoke Admin' : 'Make Admin'}
                            </button>
                        </td>
                        <td>
                            <button class="btn-small" onclick="disconnectSocial('${user.id}')">Disconnect</button>
                            <button class="btn-small btn-danger" onclick="deleteUser('${user.id}')" style="margin-left: 0.5rem;">Wipe</button>
                        </td>
                    </tr>
                    `;
                }).join('');
                
            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444;">Error: ${error.message}</td></tr>`;
            }
        }
        async function disconnectSocial(userId) {
            if(confirm("Are you sure you want to revoke this user's Meta tokens?")) {
                const response = await fetch(`${BACKEND_URL}/admin/disconnect`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-secret': ADMIN_SECRET
                    },
                    body: JSON.stringify({ target_user_id: userId })
                });
                const data = await response.json();
                alert(data.message || "Action completed.");
                loadUsers(); // Refresh the table
            }
        }

        async function deleteUser(userId) {
            if(confirm("WARNING: This will permanently delete the user's account and all associated data. Proceed?")) {
                const response = await fetch(`${BACKEND_URL}/admin/delete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-secret': ADMIN_SECRET
                    },
                    body: JSON.stringify({ target_user_id: userId })
                });
                const data = await response.json();
                alert(data.message || "User deleted.");
                loadUsers(); // Refresh the table
            }
        }

        async function toggleAdmin(userId, currentTier) {
    const newTier = (currentTier === 'admin') ? 'starter' : 'admin';
    
    if(!confirm(`Change tier from ${currentTier} to ${newTier}?`)) return;

    const response = await fetch(`${BACKEND_URL}/admin/update-tier`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-admin-secret': ADMIN_SECRET
        },
        body: JSON.stringify({ target_user_id: userId, new_tier: newTier })
    });

    if (response.ok) {
        alert("Tier updated.");
        loadUsers(); // Refresh table
    } else {
        alert("Update failed.");
    }
}
    </script>
</body>
</html>
